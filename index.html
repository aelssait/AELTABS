<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AEL top teams | CS2 Рейтинг</title>
    <style>
        :root {
            --bg-main: #1b1f26;
            --bg-card: #232932;
            --bg-header: #16191e;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --accent: #e5a93b; 
            --accent-hover: #ffc257;
            --active-green: #22c55e;
            --inactive-red: #ef4444;
            --border: #2e3641;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body { 
            background-color: var(--bg-main); 
            color: var(--text-main); 
            padding-bottom: 50px; 
            position: relative;
            min-height: 100vh;
        }

        /* Фоновая эмблема AEL из файла photo_2026-06-12_18-39-10.jpg */
        .bg-watermark {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 70vmin;
            height: 70vmin;
            background-image: url('photo_2026-06-12_18-39-10.jpg');
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0.03;
            pointer-events: none;
            z-index: 0;
            mix-blend-mode: screen;
        }

        header, .container { position: relative; z-index: 1; }

        header { background-color: var(--bg-header); border-bottom: 2px solid var(--accent); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .logo { font-size: 24px; font-weight: bold; letter-spacing: 1px; }
        .logo span { color: var(--accent); }
        
        nav button { background: none; border: none; color: var(--text-main); font-size: 16px; margin-left: 20px; cursor: pointer; padding: 5px 10px; transition: 0.2s; }
        nav button.active, nav button:hover { color: var(--accent); border-bottom: 2px solid var(--accent); }

        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }

        .admin-trigger { background: var(--bg-card); border: 1px solid var(--border); color: var(--text-muted); padding: 8px 15px; border-radius: 4px; cursor: pointer; }
        .admin-trigger:hover { border-color: var(--accent); color: var(--text-main); }
        .admin-panel { background: var(--bg-card); border: 1px solid var(--accent); padding: 20px; border-radius: 6px; margin-bottom: 20px; display: none; }
        .admin-panel h3 { margin-bottom: 15px; color: var(--accent); }
        
        .form-group { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        input, select { background: var(--bg-main); border: 1px solid var(--border); color: var(--text-main); padding: 10px; border-radius: 4px; flex: 1; min-width: 150px; }
        input:focus { border-color: var(--accent); outline: none; }
        button.btn { background: var(--accent); color: var(--bg-header); border: none; padding: 10px 20px; font-weight: bold; border-radius: 4px; cursor: pointer; }
        button.btn:hover { background: var(--accent-hover); }

        /* ТАБЛИЦА С УВЕЛИЧЕННЫМИ ПРЯМОУГОЛЬНИКАМИ */
        .ranking-table { width: 100%; border-collapse: separate; border-spacing: 0 10px; }
        .ranking-table th { color: var(--text-muted); text-align: left; padding: 10px 20px; font-size: 14px; text-transform: uppercase; }
        
        /* Увеличенные строки-карточки команд */
        .ranking-table td { background: rgba(35, 41, 50, 0.9); padding: 25px 20px; vertical-align: middle; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); backdrop-filter: blur(2px); }
        .ranking-table td:first-child { border-left: 1px solid var(--border); border-top-left-radius: 6px; border-bottom-left-radius: 6px; }
        .ranking-table td:last-child { border-right: 1px solid var(--border); border-top-right-radius: 6px; border-bottom-right-radius: 6px; }
        
        .ranking-table tr.team-row { cursor: pointer; }
        .ranking-table tr.team-row:hover td { background: rgba(43, 51, 62, 0.95); border-color: var(--accent); }
        
        .col-place { width: 70px; font-size: 20px; font-weight: bold; text-align: center; color: var(--text-muted); }
        tr:nth-child(2) .col-place { color: #f59e0b; font-size: 24px; } /* Топ 1 */
        
        .team-info-cell { display: flex; align-items: center; gap: 15px; position: relative; }
        .team-logo { width: 45px; height: 45px; border-radius: 6px; object-fit: cover; background: #16191e; border: 1px solid var(--border); }
        .team-logo-placeholder { width: 45px; height: 45px; border-radius: 6px; background: var(--border); display: flex; align-items: center; justify-content: center; font-weight: bold; color: var(--text-muted); font-size: 18px; text-transform: uppercase; }
        
        .team-name-block { display: flex; flex-direction: column; gap: 4px; }
        .col-team { font-weight: bold; font-size: 18px; }
        
        .status-tag { display: inline-block; padding: 3px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; text-transform: uppercase; margin-left: 10px; }
        .status-tag.in_game { background: rgba(34, 197, 94, 0.2); color: var(--active-green); border: 1px solid var(--active-green); }
        .status-tag.out { background: rgba(239, 68, 68, 0.2); color: var(--inactive-red); border: 1px solid var(--inactive-red); }
        
        .winner-tag { font-size: 13px; color: #f59e0b; font-weight: 600; display: flex; align-items: center; gap: 5px; margin-top: 2px; }

        .col-points { text-align: right; font-weight: bold; color: var(--accent); font-size: 18px; width: 140px; }
        .col-points span { font-size: 12px; color: var(--text-muted); font-weight: normal; margin-left: 4px; }
        
        .col-reactions { width: 180px; text-align: center; }
        .reaction-buttons { display: flex; gap: 8px; justify-content: center; }
        .btn-like, .btn-dislike { background: var(--bg-main); border: 1px solid var(--border); color: var(--text-main); padding: 8px 12px; border-radius: 4px; cursor: pointer; font-size: 14px; display: flex; align-items: center; gap: 6px; transition: 0.2s; }
        .btn-like:hover { border-color: var(--active-green); color: var(--active-green); }
        .btn-dislike:hover { border-color: var(--inactive-red); color: var(--inactive-red); }
        
        /* Стиль для кнопки, если пользователь уже проголосовал */
        .btn-reacted { opacity: 0.5; cursor: not-allowed !important; background: rgba(255,255,255,0.02) !important; border-color: var(--border) !important; color: var(--text-muted) !important; }

        .col-actions { width: 280px; text-align: center; }
        .status-admin-btns { display: flex; gap: 4px; margin-bottom: 8px; justify-content: center; }
        .btn-status { border: none; padding: 4px 8px; font-size: 11px; border-radius: 3px; cursor: pointer; font-weight: bold; color: #fff; }
        .btn-status.btn-in { background: var(--active-green); }
        .btn-status.btn-out { background: var(--inactive-red); }
        .btn-status.btn-reset { background: var(--text-muted); }

        .players-row td { padding: 0; background: none; backdrop-filter: none; border: none; }
        .players-box { padding: 20px; background: rgba(28, 33, 41, 0.9); border-left: 4px solid var(--accent); border-radius: 0 0 6px 6px; margin-top: -10px; margin-bottom: 10px; border: 1px solid var(--border); border-left: 4px solid var(--accent); }
        .players-list { display: flex; gap: 15px; flex-wrap: wrap; list-style: none; }
        .players-list li { background: var(--bg-card); padding: 8px 16px; border-radius: 4px; font-size: 14px; border: 1px solid var(--border); }

        .hidden { display: none !important; }
        .tournaments-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .tournament-card { background: rgba(35, 41, 50, 0.9); border-radius: 6px; overflow: hidden; border: 1px solid var(--border); position: relative; }
        .tournament-img { width: 100%; height: 160px; background-size: cover; background-position: center; background-color: #16191e; }
        .tournament-info { padding: 15px; }
        .tournament-title { font-size: 18px; font-weight: bold; margin-bottom: 10px; }
        .status-badge { position: absolute; top: 10px; right: 10px; padding: 4px 8px; border-radius: 3px; font-size: 12px; font-weight: bold; text-transform: uppercase; }
        .status-badge.active { background: var(--active-green); color: white; }
        .status-badge.inactive { background: var(--inactive-red); color: white; }

        .btn-danger { background: var(--inactive-red) !important; color: white !important; }
    </style>
</head>
<body>

<div class="bg-watermark"></div>

<header>
    <div class="logo">AEL <span>top teams</span></div>
    <nav>
        <button id="tab-teams" class="active" onclick="switchTab('teams')">Рейтинг команд</button>
        <button id="tab-tourneys" onclick="switchTab('tourneys')">Турниры</button>
    </nav>
    <button class="admin-trigger" onclick="toggleAdminMode()">Войти как Админ</button>
</header>

<div class="container">

    <!-- ПАНЕЛЬ АДМИНИСТРАТОРА -->
    <div id="adminPanel" class="admin-panel">
        <h3>Панель управления AEL</h3>
        
        <!-- Управление командами -->
        <div id="admin-teams-section">
            <p><strong>Добавить / Изменить команду:</strong></p>
            <div class="form-group">
                <input type="text" id="teamName" placeholder="Название команды">
                <input type="number" id="teamPoints" placeholder="Очки (баллы)">
                <input type="text" id="teamLogoUrl" placeholder="Ссылка на URL аватарки команды">
                <input type="text" id="teamWinnerOf" placeholder="Победитель какого турнира (оставьте пустым, если нет)">
                <input type="text" id="teamPlayers" placeholder="Игроки через запятую (например: s1mple, b1t, jL)">
                <button class="btn" onclick="saveTeam()">Сохранить команду</button>
            </div>
        </div>

        <!-- Управление турнирами -->
        <div id="admin-tourneys-section" class="hidden">
            <p><strong>Добавить турнир:</strong></p>
            <div class="form-group">
                <input type="text" id="tourneyName" placeholder="Название турнира">
                <input type="text" id="tourneyImg" placeholder="Ссылка на URL аватарки/лого">
                <select id="tourneyStatus">
                    <option value="active">Активно</option>
                    <option value="inactive">Неактивно</option>
                </select>
                <button class="btn" onclick="saveTournament()">Добавить турнир</button>
            </div>
        </div>
    </div>

    <!-- ВКЛАДКА: КОМАНДЫ -->
    <div id="page-teams">
        <table class="ranking-table">
            <thead>
                <tr>
                    <th class="col-place">#</th>
                    <th class="col-team">Команда</th>
                    <th class="col-points">Баллы</th>
                    <th class="col-reactions">Мнение гостей</th>
                    <th class="col-actions admin-only hidden">Действия админа</th>
                </tr>
            </thead>
            <tbody id="teamsTableBody">
                <!-- Данные подгружаются скриптом -->
            </tbody>
        </table>
    </div>

    <!-- ВКЛАДКА: ТУРНИРЫ -->
    <div id="page-tourneys" class="hidden">
        <div class="tournaments-grid" id="tournamentsGrid">
            <!-- Данные подгружаются скриптом -->
        </div>
    </div>

</div>

<script>
    let defaultTeams = [
        { id: 1, name: "Natus Vincere", points: 1000, logo: "https://img-cdn.hltv.org/teamlogo/9v6S8p0p7OQ4zWJcW8u5_O.svg?ixlib=java-2.1.0&s=7c1b500fa2066fa9d0bc650ee0e94bb7", players: ["jL", "b1t", "Aleksib", "iIM", "w0nderful"], likes: 15, dislikes: 2, tournamentStatus: "in_game", winnerOf: "AEL Masters 2026" },
        { id: 2, name: "FaZe Clan", points: 850, logo: "", players: ["karrigan", "NiKo", "ropz", "broky", "rain"], likes: 8, dislikes: 4, tournamentStatus: "out", winnerOf: "" },
        { id: 3, name: "Team Spirit", points: 920, logo: "", players: ["shalfey", "chopper", "magixx", "donk", "zoner"], likes: 23, dislikes: 1, tournamentStatus: "none", winnerOf: "" }
    ];

    let defaultTournaments = [
        { id: 1, name: "AEL Masters 2026", img: "https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=500", status: "active" }
    ];

    let teams = JSON.parse(localStorage.getItem('ael_teams')) || defaultTeams;
    let tournaments = JSON.parse(localStorage.getItem('ael_tournaments')) || defaultTournaments;
    
    // Массив для хранения ID команд, за которые пользователь УЖЕ голосовал на этом устройстве
    let votedTeams = JSON.parse(localStorage.getItem('ael_voted_teams')) || [];

    let isAdmin = false;
    let editingTeamId = null;

    saveToStorage();
    renderTeams();
    renderTournaments();

    function saveToStorage() {
        localStorage.setItem('ael_teams', JSON.stringify(teams));
        localStorage.setItem('ael_tournaments', JSON.stringify(tournaments));
        localStorage.setItem('ael_voted_teams', JSON.stringify(votedTeams));
    }

    function toggleAdminMode() {
        if (!isAdmin) {
            let pass = prompt("Введите пароль администратора:");
            if (pass === "adminAEL") { 
                isAdmin = true;
                document.getElementById('adminPanel').style.display = 'block';
                document.querySelectorAll('.admin-only').forEach(el => el.classList.remove('hidden'));
                alert("Вы вошли как администратор!");
                renderTeams();
            } else {
                alert("Неверный пароль!");
            }
        } else {
            isAdmin = false;
            document.getElementById('adminPanel').style.display = 'none';
            document.querySelectorAll('.admin-only').forEach(el => el.classList.add('hidden'));
            renderTeams();
        }
    }

    function switchTab(tab) {
        document.getElementById('tab-teams').classList.remove('active');
        document.getElementById('tab-tourneys').classList.remove('active');
        document.getElementById('page-teams').classList.add('hidden');
        document.getElementById('page-tourneys').classList.add('hidden');
        document.getElementById('admin-teams-section').classList.add('hidden');
        document.getElementById('admin-tourneys-section').classList.add('hidden');

        if (tab === 'teams') {
            document.getElementById('tab-teams').classList.add('active');
            document.getElementById('page-teams').classList.remove('hidden');
            document.getElementById('admin-teams-section').classList.remove('hidden');
        } else {
            document.getElementById('tab-tourneys').classList.add('active');
            document.getElementById('page-tourneys').classList.remove('hidden');
            document.getElementById('admin-tourneys-section').classList.remove('hidden');
        }
    }

    function renderTeams() {
        teams.sort((a, b) => b.points - a.points);
        
        const tbody = document.getElementById('teamsTableBody');
        tbody.innerHTML = '';

        teams.forEach((team, index) => {
            let logoHtml = team.logo 
                ? `<img class="team-logo" src="${team.logo}" alt="${team.name}">`
                : `<div class="team-logo-placeholder">${team.name.charAt(0)}</div>`;

            let statusTagHtml = '';
            if (team.tournamentStatus === 'in_game') {
                statusTagHtml = `<span class="status-tag in_game">Участвует</span>`;
            } else if (team.tournamentStatus === 'out') {
                statusTagHtml = `<span class="status-tag out">Вылетел</span>`;
            }

            let winnerHtml = '';
            if (team.winnerOf && team.winnerOf.trim() !== "") {
                winnerHtml = `<div class="winner-tag">🏆 Победитель ${team.winnerOf}</div>`;
            }

            // Проверяем, голосовал ли уже пользователь за эту команду
            const hasVoted = votedTeams.includes(team.id);
            const reactedClass = hasVoted ? 'btn-reacted' : '';

            const tr = document.createElement('tr');
            tr.className = 'team-row';
            tr.innerHTML = `
                <td class="col-place" onclick="togglePlayers(${team.id})">${index + 1}</td>
                <td class="col-team" onclick="togglePlayers(${team.id})">
                    <div class="team-info-cell">
                        ${logoHtml}
                        <div class="team-name-block">
                            <div><span style="font-size: 18px;">${team.name}</span> ${statusTagHtml}</div>
                            ${winnerHtml}
                        </div>
                    </div>
                </td>
                <td class="col-points" onclick="togglePlayers(${team.id})">${team.points}<span>очки</span></td>
                <td class="col-reactions">
                    <div class="reaction-buttons">
                        <button class="btn-like ${reactedClass}" onclick="likeTeam(${team.id}, event, true)">👍 <span>${team.likes || 0}</span></button>
                        <button class="btn-dislike ${reactedClass}" onclick="likeTeam(${team.id}, event, false)">👎 <span>${team.dislikes || 0}</span></button>
                    </div>
                </td>
                <td class="col-actions admin-only ${isAdmin ? '' : 'hidden'}">
                    <div class="status-admin-btns">
                        <button class="btn-status btn-in" onclick="changeTeamTourneyStatus(${team.id}, 'in_game', event)">Участвует</button>
                        <button class="btn-status btn-out" onclick="changeTeamTourneyStatus(${team.id}, 'out', event)">Вылетел</button>
                        <button class="btn-status btn-reset" onclick="changeTeamTourneyStatus(${team.id}, 'none', event)">Сброс</button>
                    </div>
                    <button onclick="editTeam(${team.id}, event)" style="background:none; border:none; color:var(--accent); cursor:pointer; margin-right:15px; font-size:16px;">✏️ Редактировать</button>
                    <button onclick="deleteTeam(${team.id}, event)" style="background:none; border:none; color:var(--inactive-red); cursor:pointer; font-size:16px;">❌ Удалить</button>
                </td>
            `;
            tbody.appendChild(tr);

            const playersTr = document.createElement('tr');
            playersTr.id = `players-${team.id}`;
            playersTr.className = 'players-row';
            
            let playersHtml = team.players.map(p => `<li>${p}</li>`).join('');
            if(team.players.length === 0) playersHtml = '<span style="color:var(--text-muted); font-size:13px;">Состав не указан</span>';

            playersTr.innerHTML = `
                <td colspan="${isAdmin ? 5 : 4}">
                    <div class="players-box">
                        <strong style="font-size:12px; text-transform:uppercase; color:var(--text-muted); display:block; margin-bottom:8px;">Текущий ростер:</strong>
                        <ul class="players-list">${playersHtml}</ul>
                    </div>
                </td>
            `;
            tbody.appendChild(playersTr);
        });
    }

    function togglePlayers(id) {
        const row = document.getElementById(`players-${id}`);
        row.style.display = (row.style.display === 'table-row') ? 'none' : 'table-row';
    }

    function changeTeamTourneyStatus(id, status, event) {
        event.stopPropagation();
        const team = teams.find(t => t.id === id);
        team.tournamentStatus = status;
        saveToStorage();
        renderTeams();
    }

    // Измененная функция: Ограничение на 1 реакцию с устройства
    function likeTeam(id, event, isLike = true) {
        event.stopPropagation();
        
        // Если ID команды уже есть в массиве проголосовавших — блокируем действие
        if (votedTeams.includes(id)) {
            alert("Вы уже оставили своё мнение об этой команде!");
            return;
        }

        const team = teams.find(t => t.id === id);
        if (isLike) {
            team.likes = (team.likes || 0) + 1;
        } else {
            team.dislikes = (team.dislikes || 0) + 1;
        }

        // Добавляем ID команды в список проголосовавших на данном ПК/смартфоне
        votedTeams.push(id);
        
        saveToStorage();
        renderTeams();
    }

    function saveTeam() {
        const name = document.getElementById('teamName').value.trim();
        const points = parseInt(document.getElementById('teamPoints').value) || 0;
        const logo = document.getElementById('teamLogoUrl').value.trim();
        const winnerOf = document.getElementById('teamWinnerOf').value.trim();
        const playersString = document.getElementById('teamPlayers').value;
        const players = playersString ? playersString.split(',').map(p => p.trim()) : [];

        if (!name) return alert('Введите название команды!');

        if (editingTeamId) {
            const team = teams.find(t => t.id === editingTeamId);
            team.name = name;
            team.points = points;
            team.logo = logo;
            team.winnerOf = winnerOf;
            team.players = players;
            editingTeamId = null;
        } else {
            teams.push({ id: Date.now(), name, points, logo, winnerOf, players, likes: 0, dislikes: 0, tournamentStatus: 'none' });
        }

        document.getElementById('teamName').value = '';
        document.getElementById('teamPoints').value = '';
        document.getElementById('teamLogoUrl').value = '';
        document.getElementById('teamWinnerOf').value = '';
        document.getElementById('teamPlayers').value = '';
        
        saveToStorage();
        renderTeams();
    }

    function editTeam(id, event) {
        event.stopPropagation();
        const team = teams.find(t => t.id === id);
        document.getElementById('teamName').value = team.name;
        document.getElementById('teamPoints').value = team.points;
        document.getElementById('teamLogoUrl').value = team.logo || '';
        document.getElementById('teamWinnerOf').value = team.winnerOf || '';
        document.getElementById('teamPlayers').value = team.players.join(', ');
        editingTeamId = id;
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function deleteTeam(id, event) {
        event.stopPropagation();
        if(confirm("Удалить эту команду?")) {
            teams = teams.filter(t => t.id !== id);
            // Удаляем команду из истории голосования, если её удалил админ
            votedTeams = votedTeams.filter(vId => vId !== id);
            saveToStorage();
            renderTeams();
        }
    }

    function renderTournaments() {
        const grid = document.getElementById('tournamentsGrid');
        grid.innerHTML = '';

        tournaments.forEach(t => {
            const card = document.createElement('div');
            card.className = 'tournament-card';
            
            const badgeClass = t.status === 'active' ? 'active' : 'inactive';
            const badgeText = t.status === 'active' ? 'Активно' : 'Неактивно';

            card.innerHTML = `
                <div class="tournament-img" style="background-image: url('${t.img || 'https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=500'}')"></div>
                <span class="status-badge ${badgeClass}">${badgeText}</span>
                <div class="tournament-info">
                    <div class="tournament-title">${t.name}</div>
                    <div class="admin-only ${isAdmin ? '' : 'hidden'}" style="margin-top:10px; display:flex; gap:10px;">
                        <button class="btn" onclick="toggleTourneyStatus(${t.id})" style="padding:4px 8px; font-size:12px;">Сменить статус</button>
                        <button class="btn btn-danger" onclick="deleteTourney(${t.id})" style="padding:4px 8px; font-size:12px;">Удалить</button>
                    </div>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    function saveTournament() {
        const name = document.getElementById('tourneyName').value.trim();
        const img = document.getElementById('tourneyImg').value.trim();
        const status = document.getElementById('tourneyStatus').value;

        if (!name) return alert('Введите название турнира!');

        tournaments.push({ id: Date.now(), name, img, status });
        document.getElementById('tourneyName').value = '';
        document.getElementById('tourneyImg').value = '';
        
        saveToStorage();
        renderTournaments();
    }

    function toggleTourneyStatus(id) {
        const tourney = tournaments.find(t => t.id === id);
        tourney.status = tourney.status === 'active' ? 'inactive' : 'active';
        saveToStorage();
        renderTournaments();
    }

    function deleteTourney(id) {
        if(confirm("Удалить турнир?")) {
            tournaments = tournaments.filter(t => t.id !== id);
            saveToStorage();
            renderTournaments();
        }
    }
</script>
</body>
</html>
