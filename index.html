<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Рейтинг Команд и Турниры</title>
    <style>
        :root {
            --bg-color: #f9f9f9;
            --card-bg: #ffffff;
            --border-color: #e0e0e0;
            --text-color: #222222;
            --text-secondary: #666666;
            --accent-color: #007bff;
            --success-color: #2ed573;
            --danger-color: #ff4757;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        header { width: 100%; max-width: 600px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 2px solid var(--border-color); padding-bottom: 15px; }
        h1 { font-size: 24px; font-weight: 700; }
        
        .nav-buttons { display: flex; gap: 10px; }
        .nav-btn { background: none; border: 1px solid var(--border-color); padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .nav-btn.active { background-color: var(--text-color); color: white; border-color: var(--text-color); }

        .container { width: 100%; max-width: 600px; display: none; }
        .container.active { display: block; }

        /* Стили карточек команд */
        .team-card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 15px 20px; margin-bottom: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.02); transition: transform 0.2s, box-shadow 0.2s; }
        .team-card:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        
        .team-header { display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .team-info { display: flex; align-items: center; gap: 15px; }
        .team-points { font-weight: 700; font-size: 18px; color: var(--accent-color); background: #e6f2ff; padding: 4px 10px; border-radius: 20px; }
        .team-name { font-size: 18px; font-weight: 600; }
        
        .team-avatar { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; border: 1px solid var(--border-color); background: #eee; }

        /* Список игроков внутри команды */
        .players-list { margin-top: 15px; padding-top: 15px; border-top: 1px dashed var(--border-color); display: none; }
        .players-list.open { display: block; }
        .player-item { padding: 6px 0; font-size: 15px; color: var(--text-secondary); display: flex; justify-content: space-between; align-items: center; }

        /* Турниры */
        .tournament-card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 15px 20px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        .status-badge { padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; text-transform: uppercase; }
        .status-badge.active { background: #e3fcef; color: var(--success-color); }
        .status-badge.inactive { background: #ffebee; color: var(--danger-color); }

        /* Админка */
        .admin-panel { background: #fff; border: 2px dashed var(--accent-color); border-radius: 12px; padding: 20px; margin-bottom: 25px; width: 100%; max-width: 600px; display: none; }
        .admin-panel.visible { display: block; }
        .admin-panel h3 { margin-bottom: 15px; color: var(--accent-color); }
        
        .form-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; }
        .form-group input, .form-group select { padding: 10px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 14px; }
        .admin-btn { background: var(--accent-color); color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; font-weight: 600; }
        .admin-btn:hover { opacity: 0.9; }

        .admin-actions { display: flex; gap: 5px; align-items: center; }
        .action-btn { border: none; background: #eee; padding: 5px 8px; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .action-btn.del { background: var(--danger-color); color: white; }
    </style>
</head>
<body>

    <!-- Панель администратора (появляется только при #admin в ссылке) -->
    <div class="admin-panel" id="adminPanel">
        <h3>🛠️ Панель Администратора</h3>
        <div style="display: flex; gap: 10px; margin-bottom: 15px;">
            <button class="nav-btn active" id="toggleAddTeam" onclick="switchAdminForm('team')">+ Команда</button>
            <button class="nav-btn" id="toggleAddTourney" onclick="switchAdminForm('tourney')">+ Турнир</button>
        </div>

        <!-- Форма добавления команды -->
        <div id="formTeam">
            <div class="form-group">
                <input type="text" id="teamNameInput" placeholder="Название команды">
                <input type="text" id="teamImgInput" placeholder="Ссылка на аватарку (URL)">
                <input type="number" id="teamPointsInput" placeholder="Очки команды" value="0">
            </div>
            <button class="admin-btn" onclick="addTeam()">Добавить команду</button>
        </div>

        <!-- Форма добавления турнира -->
        <div id="formTourney" style="display:none;">
            <div class="form-group">
                <input type="text" id="tourneyNameInput" placeholder="Название турнира">
                <input type="text" id="tourneyImgInput" placeholder="Ссылка на аватарку турнира (URL)">
                <select id="tourneyStatusInput">
                    <option value="true">Активен</option>
                    <option value="false">Завершен</option>
                </select>
            </div>
            <button class="admin-btn" onclick="addTournament()">Добавить турнир</button>
        </div>
    </div>

    <!-- Шапка сайта -->
    <header>
        <h1 id="pageTitle">Рейтинг команд</h1>
        <div class="nav-buttons">
            <button class="nav-btn active" id="btnTeams" onclick="switchTab('teams')">Рейтинг</button>
            <button class="nav-btn" id="btnTourneys" onclick="switchTab('tourneys')">Турниры</button>
        </div>
    </header>

    <!-- Контент: Команды -->
    <div class="container active" id="teamsContainer"></div>

    <!-- Контент: Турниры -->
    <div class="container" id="tourneysContainer"></div>

    <script>
        // Изначальные тестовые данные (если в браузере еще ничего не сохранено)
        const defaultData = {
            teams: [
                { id: 1, name: "NAVI", points: 1500, logo: "https://placehold.co/100x100/png?text=NAVI", players: ["s1mple", "b1t", "Aleksib"] },
                { id: 2, name: "Team Spirit", points: 1800, logo: "https://placehold.co/100x100/png?text=Spirit", players: ["donk", "shirin", "chopper"] }
            ],
            tournaments: [
                { id: 1, name: "PGL Major 2026", logo: "https://placehold.co/100x100/png?text=PGL", isActive: true },
                { id: 2, name: "Winter Cup", logo: "https://placehold.co/100x100/png?text=WC", isActive: false }
            ]
        };

        // Загрузка данных из памяти или установка дефолтных
        let data = JSON.parse(localStorage.getItem('tournament_db')) || defaultData;
        let isAdmin = false;

        function saveToStorage() {
            localStorage.setItem('tournament_db', JSON.stringify(data));
            render();
        }

        // Проверка на админа по хэшу #admin в URL
        function checkAdminAuth() {
            isAdmin = window.location.hash === '#admin';
            const panel = document.getElementById('adminPanel');
            if(isAdmin) {
                panel.classList.add('visible');
            } else {
                panel.classList.remove('visible');
            }
            render();
        }

        window.addEventListener('hashchange', checkAdminAuth);
        window.addEventListener('DOMContentLoaded', checkAdminAuth);

        // Переключение вкладок (Рейтинг / Турниры)
        function switchTab(tab) {
            document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-buttons .nav-btn').forEach(b => b.classList.remove('active'));
            
            if(tab === 'teams') {
                document.getElementById('teamsContainer').classList.add('active');
                document.getElementById('btnTeams').classList.add('active');
                document.getElementById('pageTitle').innerText = "Рейтинг команд";
            } else {
                document.getElementById('tourneysContainer').classList.add('active');
                document.getElementById('btnTourneys').classList.add('active');
                document.getElementById('pageTitle').innerText = "Текущие турниры";
            }
        }

        function switchAdminForm(type) {
            document.getElementById('toggleAddTeam').classList.toggle('active', type === 'team');
            document.getElementById('toggleAddTourney').classList.toggle('active', type === 'tourney');
            document.getElementById('formTeam').style.display = type === 'team' ? 'block' : 'none';
            document.getElementById('formTourney').style.style.display = type === 'tourney' ? 'block' : 'none';
            document.getElementById('formTourney').style.display = type === 'tourney' ? 'block' : 'none';
        }

        // Рендеринг списков
        function render() {
            // 1. Рендер команд (сортировка по очкам от большего к меньшему)
            const teamsContainer = document.getElementById('teamsContainer');
            teamsContainer.innerHTML = '';
            
            let sortedTeams = [...data.teams].sort((a, b) => b.points - a.points);

            sortedTeams.forEach(team => {
                const card = document.createElement('div');
                card.className = 'team-card';
                
                let playersHTML = team.players.map(p => `<div class="player-item"><span>👤 ${p}</span> ${isAdmin ? `<button class="action-btn del" onclick="deletePlayer(${team.id}, '${p}')">×</button>` : ''}</div>`).join('');
                
                let adminTeamControls = isAdmin ? `
                    <div class="admin-actions" onclick="event.stopPropagation()">
                        <button class="action-btn" onclick="changePoints(${team.id}, 100)">+100</button>
                        <button class="action-btn" onclick="changePoints(${team.id}, -100)">-100</button>
                        <button class="action-btn del" onclick="deleteTeam(${team.id})">Удалить</button>
                    </div>
                    <div class="form-group" style="margin-top:10px; flex-direction:row;" onclick="event.stopPropagation()">
                        <input type="text" id="addPlayerInput-${team.id}" placeholder="Имя игрока" style="padding:4px; font-size:12px;">
                        <button class="admin-btn" style="padding:4px 10px; font-size:12px;" onclick="addPlayer(${team.id})">+</button>
                    </div>
                ` : '';

                card.innerHTML = `
                    <div class="team-header" onclick="togglePlayers(${team.id})">
                        <div class="team-info">
                            <span class="team-points">${team.points}</span>
                            <span class="team-name">${team.name}</span>
                        </div>
                        <img src="${team.logo || 'https://placehold.co/100x100'}" class="team-avatar" alt="logo">
                    </div>
                    <div class="players-list" id="players-${team.id}">
                        <h4 style="font-size:14px; margin-bottom:5px;">Состав команды:</h4>
                        ${playersHTML || '<p style="font-size:12px; color:#999;">Нет игроков</p>'}
                        ${adminTeamControls}
                    </div>
                `;
                teamsContainer.appendChild(card);
            });

            // 2. Рендер турниров
            const tourneysContainer = document.getElementById('tourneysContainer');
            tourneysContainer.innerHTML = '';

            data.tournaments.forEach(t => {
                const card = document.createElement('div');
                card.className = 'tournament-card';
                card.innerHTML = `
                    <div class="team-info">
                        <img src="${t.logo || 'https://placehold.co/100x100'}" class="team-avatar" alt="logo">
                        <span class="team-name">${t.name}</span>
                    </div>
                    <div style="display:flex; align-items:center; gap:10px;">
                        <span class="status-badge ${t.isActive ? 'active' : 'inactive'}">${t.isActive ? 'Активен' : 'Завершен'}</span>
                        ${isAdmin ? `
                            <button class="action-btn" onclick="toggleTourneyStatus(${t.id})">Сменить статус</button>
                            <button class="action-btn del" onclick="deleteTourney(${t.id})">×</button>
                        ` : ''}
                    </div>
                `;
                tourneysContainer.appendChild(card);
            });
        }

        // Логика раскрытия списка игроков
        function togglePlayers(id) {
            const list = document.getElementById(`players-${id}`);
            list.classList.toggle('open');
        }

        // --- ФУНКЦИИ АДМИНА ---
        function addTeam() {
            const name = document.getElementById('teamNameInput').value.trim();
            const logo = document.getElementById('teamImgInput').value.trim();
            const points = parseInt(document.getElementById('teamPointsInput').value) || 0;

            if(!name) return alert('Введите название!');
            
            data.teams.push({ id: Date.now(), name, points, logo, players: [] });
            document.getElementById('teamNameInput').value = '';
            document.getElementById('teamImgInput').value = '';
            saveToStorage();
        }

        function deleteTeam(id) {
            data.teams = data.teams.filter(t => t.id !== id);
            saveToStorage();
        }

        function changePoints(id, amount) {
            const team = data.teams.find(t => t.id === id);
            if(team) { team.points += amount; saveToStorage(); }
        }

        function addPlayer(teamId) {
            const input = document.getElementById(`addPlayerInput-${teamId}`);
            const name = input.value.trim();
            if(!name) return;
            const team = data.teams.find(t => t.id === teamId);
            if(team) { team.players.push(name); input.value = ''; saveToStorage(); }
        }

        function deletePlayer(teamId, playerName) {
            const team = data.teams.find(t => t.id === teamId);
            if(team) { team.players = team.players.filter(p => p !== playerName); saveToStorage(); }
        }

        function addTournament() {
            const name = document.getElementById('tourneyNameInput').value.trim();
            const logo = document.getElementById('tourneyImgInput').value.trim();
            const isActive = document.getElementById('tourneyStatusInput').value === 'true';

            if(!name) return alert('Введите название турнира!');

            data.tournaments.push({ id: Date.now(), name, logo, isActive });
            document.getElementById('tourneyNameInput').value = '';
            document.getElementById('tourneyImgInput').value = '';
            saveToStorage();
        }

        function toggleTourneyStatus(id) {
            const tourney = data.tournaments.find(t => t.id === id);
            if(tourney) { tourney.isActive = !tourney.isActive; saveToStorage(); }
        }

        function deleteTourney(id) {
            data.tournaments = data.tournaments.filter(t => t.id !== id);
            saveToStorage();
        }
    </script>
</body>
</html>
