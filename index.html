<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AEL top teams | CS2 Рейтинг</title>
    <style>
        /* Стилевая палитра в духе HLTV */
        :root {
            --bg-main: #1b1f26;
            --bg-card: #232932;
            --bg-header: #16191e;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --accent: #e5a93b; /* Фирменный желтый HLTV */
            --accent-hover: #ffc257;
            --active-green: #22c55e;
            --inactive-red: #ef4444;
            --border: #2e3641;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-main); padding-bottom: 50px; }

        /* Шапка сайта */
        header { background-color: var(--bg-header); border-bottom: 2px solid var(--accent); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 24px; font-weight: bold; tracking-letter: 1px; }
        .logo span { color: var(--accent); }
        
        nav button { background: none; border: none; color: var(--text-main); font-size: 16px; margin-left: 20px; cursor: pointer; padding: 5px 10px; transition: 0.2s; }
        nav button.active, nav button:hover { color: var(--accent); border-bottom: 2px solid var(--accent); }

        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }

        /* Кнопка Админа и Панель */
        .admin-trigger { background: var(--bg-card); border: 1px solid var(--border); color: var(--text-muted); padding: 8px 15px; border-radius: 4px; cursor: pointer; }
        .admin-trigger:hover { border-color: var(--accent); color: var(--text-main); }
        .admin-panel { background: var(--bg-card); border: 1px solid var(--accent); padding: 20px; border-radius: 6px; margin-bottom: 20px; display: none; }
        .admin-panel h3 { margin-bottom: 15px; color: var(--accent); }
        
        /* Формы */
        .form-group { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        input, select { background: var(--bg-main); border: 1px solid var(--border); color: var(--text-main); padding: 10px; border-radius: 4px; flex: 1; min-width: 150px; }
        input:focus { border-color: var(--accent); outline: none; }
        button.btn { background: var(--accent); color: var(--bg-header); border: none; padding: 10px 20px; font-weight: bold; border-radius: 4px; cursor: pointer; }
        button.btn:hover { background: var(--accent-hover); }

        /* Таблица Рейтинга */
        .ranking-table { width: 100%; border-collapse: collapse; background: var(--bg-card); border-radius: 6px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .ranking-table th { background: var(--bg-header); color: var(--text-muted); text-align: left; padding: 15px; font-size: 14px; text-transform: uppercase; }
        .ranking-table td { padding: 15px; border-bottom: 1px solid var(--border); cursor: pointer; transition: 0.1s; }
        .ranking-table tr:hover td { background: rgba(255,255,255,0.02); }
        
        .col-place { width: 60px; font-weight: bold; text-align: center; color: var(--text-muted); }
        tr:nth-child(1) .col-place { color: #gold; color: #f59e0b; font-size: 18px; } /* Топ 1 */
        .col-team { font-weight: bold; font-size: 16px; }
        .col-points { text-align: right; font-weight: bold; color: var(--accent); width: 120px; }
        .col-actions { width: 100px; text-align: center; }

        /* Состав команды (выпадающий) */
        .players-row { display: none; background: #1c2129; }
        .players-box { padding: 15px; border-left: 3px solid var(--accent); }
        .players-list { display: flex; gap: 15px; flex-wrap: wrap; list-style: none; }
        .players-list li { background: var(--bg-card); padding: 5px 12px; border-radius: 3px; font-size: 14px; border: 1px solid var(--border); }

        /* Вкладка Турниры */
        .hidden { display: none !important; }
        .tournaments-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .tournament-card { background: var(--bg-card); border-radius: 6px; overflow: hidden; border: 1px solid var(--border); position: relative; }
        .tournament-img { width: 100%; height: 160px; background-size: cover; background-position: center; background-color: #16191e; }
        .tournament-info { padding: 15px; }
        .tournament-title { font-size: 18px; font-weight: bold; margin-bottom: 10px; }
        .status-badge { position: absolute; top: 10px; right: 10px; padding: 4px 8px; border-radius: 3px; font-size: 12px; font-weight: bold; text-transform: uppercase; }
        .status-badge.active { background: var(--active-green); color: white; }
        .status-badge.inactive { background: var(--inactive-red); color: white; }

        .btn-danger { background: var(--inactive-red) !important; color: white !important; }
    </style>
</head>
<body>

<header>
    <div class="logo">AEL <span>top teams</span></div>
    <nav>
        <button id="tab-teams" class="active" onclick="switchTab('teams')">Рейтинг команд</button>
        <button id="tab-tourneys" onclick="switchTab('tourneys')">Турниры</button>
    </nav>
    <button class="admin-trigger" onclick="toggleAdminMode()">Войти как Админ</button>
</header>

<div class="container">

    <!-- ПАНЕЛЬ АДМИНИСТРАТОРА -->
    <div id="adminPanel" class="admin-panel">
        <h3>Панель управления AEL</h3>
        
        <!-- Управление командами -->
        <div id="admin-teams-section">
            <p><strong>Добавить / Изменить команду:</strong></p>
            <div class="form-group">
                <input type="text" id="teamName" placeholder="Название команды">
                <input type="number" id="teamPoints" placeholder="Баллы (очки)">
                <input type="text" id="teamPlayers" placeholder="Игроки через запятую (например: s1mple, b1t, jL)">
                <button class="btn" onclick="saveTeam()">Сохранить команду</button>
            </div>
        </div>

        <!-- Управление турнирами -->
        <div id="admin-tourneys-section" class="hidden">
            <p><strong>Добавить турнир:</strong></p>
            <div class="form-group">
                <input type="text" id="tourneyName" placeholder="Название турнира">
                <input type="text" id="tourneyImg" placeholder="Ссылка на URL аватарки/лого">
                <select id="tourneyStatus">
                    <option value="active">Активно</option>
                    <option value="inactive">Неактивно</option>
                </select>
                <button class="btn" onclick="saveTournament()">Добавить турнир</button>
            </div>
        </div>
    </div>

    <!-- ВКЛАДКА: КОМАНДЫ -->
    <div id="page-teams">
        <table class="ranking-table">
            <thead>
                <tr>
                    <th class="col-place">#</th>
                    <th class="col-team">Команда</th>
                    <th class="col-points">Баллы</th>
                    <th class="col-actions admin-only hidden">Действия</th>
                </tr>
            </thead>
            <tbody id="teamsTableBody">
                <!-- Данные загружаются скриптом -->
            </tbody>
        </table>
    </div>

    <!-- ВКЛАДКА: ТУРНИРЫ -->
    <div id="page-tourneys" class="hidden">
        <div class="tournaments-grid" id="tournamentsGrid">
            <!-- Данные загружаются скриптом -->
        </div>
    </div>

</div>

<script>
    // Изначальные (демо) данные, чтобы сайт не был пустым при первом запуске
    let teams = [
        { id: 1, name: "Natus Vincere", points: 1000, players: ["jL", "b1t", "Aleksib", "iIM", "w0nderful"] },
        { id: 2, name: "FaZe Clan", points: 850, players: ["karrigan", "NiKo", "ropz", "broky", "rain"] },
        { id: 3, name: "Team Spirit", points: 920, players: ["shalfey", "chopper", "magixx", "donk", "zoner"] }
    ];

    let tournaments = [
        { id: 1, name: "AEL Masters 2026", img: "https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=500", status: "active" },
        { id: 2, name: "AEL Spring Cup", img: "https://images.unsplash.com/photo-1560253023-3ec5d502959f?q=80&w=500", status: "inactive" }
    ];

    let isAdmin = false;
    let editingTeamId = null;

    // Инициализация при загрузке
    renderTeams();
    renderTournaments();

    function toggleAdminMode() {
        if (!isAdmin) {
            let pass = prompt("Введите пароль администратора:");
            if (pass === "adminAEL") { // Временный простой пароль
                isAdmin = true;
                document.getElementById('adminPanel').style.display = 'block';
                document.querySelectorAll('.admin-only').forEach(el => el.classList.remove('hidden'));
                alert("Вы вошли как администратор!");
                renderTeams();
            } else {
                alert("Неверный пароль!");
            }
        } else {
            isAdmin = false;
            document.getElementById('adminPanel').style.display = 'none';
            document.querySelectorAll('.admin-only').forEach(el => el.classList.add('hidden'));
        }
    }

    function switchTab(tab) {
        document.getElementById('tab-teams').classList.remove('active');
        document.getElementById('tab-tourneys').classList.remove('active');
        document.getElementById('page-teams').classList.add('hidden');
        document.getElementById('page-tourneys').classList.add('hidden');
        document.getElementById('admin-teams-section').classList.add('hidden');
        document.getElementById('admin-tourneys-section').classList.add('hidden');

        if (tab === 'teams') {
            document.getElementById('tab-teams').classList.add('active');
            document.getElementById('page-teams').classList.remove('hidden');
            document.getElementById('admin-teams-section').classList.remove('hidden');
        } else {
            document.getElementById('tab-tourneys').classList.add('active');
            document.getElementById('page-tourneys').classList.remove('hidden');
            document.getElementById('admin-tourneys-section').classList.remove('hidden');
        }
    }

    // Рендеринг таблицы команд (с автосортировкой по баллам)
    function renderTeams() {
        // Сортировка: у кого больше баллов — тот выше
        teams.sort((a, b) => b.points - a.points);
        
        const tbody = document.getElementById('teamsTableBody');
        tbody.innerHTML = '';

        teams.forEach((team, index) => {
            // Строка команды
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td class="col-place" onclick="togglePlayers(${team.id})">${index + 1}</td>
                <td class="col-team" onclick="togglePlayers(${team.id})">${team.name}</td>
                <td class="col-points" onclick="togglePlayers(${team.id})">${team.points} <span style="font-size:11px;color:var(--text-muted)">pts</span></td>
                <td class="col-actions admin-only ${isAdmin ? '' : 'hidden'}">
                    <button onclick="editTeam(${team.id})" style="background:none; border:none; color:var(--accent); cursor:pointer; margin-right:10px;">✏️</button>
                    <button onclick="deleteTeam(${team.id})" style="background:none; border:none; color:var(--inactive-red); cursor:pointer;">❌</button>
                </td>
            `;
            tbody.appendChild(tr);

            // Скрытая строка с игроками
            const playersTr = document.createElement('tr');
            playersTr.id = `players-${team.id}`;
            playersTr.className = 'players-row';
            
            let playersHtml = team.players.map(p => `<li>${p}</li>`).join('');
            if(team.players.length === 0) playersHtml = '<span style="color:var(--text-muted); font-size:13px;">Состав не указан</span>';

            playersTr.innerHTML = `
                <td colspan="${isAdmin ? 4 : 3}">
                    <div class="players-box">
                        <strong style="font-size:12px; text-transform:uppercase; color:var(--text-muted); display:block; margin-bottom:8px;">Текущий ростер:</strong>
                        <ul class="players-list">${playersHtml}</ul>
                    </div>
                </td>
            `;
            tbody.appendChild(playersTr);
        });
    }

    function togglePlayers(id) {
        const row = document.getElementById(`players-${id}`);
        row.style.display = (row.style.display === 'table-row') ? 'none' : 'table-row';
    }

    // Функции админки для Команд
    function saveTeam() {
        const name = document.getElementById('teamName').value.trim();
        const points = parseInt(document.getElementById('teamPoints').value) || 0;
        const playersString = document.getElementById('teamPlayers').value;
        const players = playersString ? playersString.split(',').map(p => p.trim()) : [];

        if (!name) return alert('Введите название команды!');

        if (editingTeamId) {
            // Редактирование
            const team = teams.find(t => t.id === editingTeamId);
            team.name = name;
            team.points = points;
            team.players = players;
            editingTeamId = null;
        } else {
            // Создание новой
            teams.push({ id: Date.now(), name, points, players });
        }

        // Очистка формы
        document.getElementById('teamName').value = '';
        document.getElementById('teamPoints').value = '';
        document.getElementById('teamPlayers').value = '';
        
        renderTeams();
    }

    function editTeam(id) {
        const team = teams.find(t => t.id === id);
        document.getElementById('teamName').value = team.name;
        document.getElementById('teamPoints').value = team.points;
        document.getElementById('teamPlayers').value = team.players.join(', ');
        editingTeamId = id;
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function deleteTeam(id) {
        if(confirm("Удалить эту команду?")) {
            teams = teams.filter(t => t.id !== id);
            renderTeams();
        }
    }

    // Рендеринг Турниров
    function renderTournaments() {
        const grid = document.getElementById('tournamentsGrid');
        grid.innerHTML = '';

        tournaments.forEach(t => {
            const card = document.createElement('div');
            card.className = 'tournament-card';
            
            const badgeClass = t.status === 'active' ? 'active' : 'inactive';
            const badgeText = t.status === 'active' ? 'Активно' : 'Неактивно';

            card.innerHTML = `
                <div class="tournament-img" style="background-image: url('${t.img || 'https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=500'}')"></div>
                <span class="status-badge ${badgeClass}">${badgeText}</span>
                <div class="tournament-info">
                    <div class="tournament-title">${t.name}</div>
                    <div class="admin-only ${isAdmin ? '' : 'hidden'}" style="margin-top:10px; display:flex; gap:10px;">
                        <button class="btn" onclick="toggleTourneyStatus(${t.id})" style="padding:4px 8px; font-size:12px;">Сменить статус</button>
                        <button class="btn btn-danger" onclick="deleteTourney(${t.id})" style="padding:4px 8px; font-size:12px;">Удалить</button>
                    </div>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    // Функции админки для Турниров
    function saveTournament() {
        const name = document.getElementById('tourneyName').value.trim();
        const img = document.getElementById('tourneyImg').value.trim();
        const status = document.getElementById('tourneyStatus').value;

        if (!name) return alert('Введите название турнира!');

        tournaments.push({ id: Date.now(), name, img, status });
        
        document.getElementById('tourneyName').value = '';
        document.getElementById('tourneyImg').value = '';
        
        renderTournaments();
    }

    function toggleTourneyStatus(id) {
        const tourney = tournaments.find(t => t.id === id);
        tourney.status = tourney.status === 'active' ? 'inactive' : 'active';
        renderTournaments();
    }

    function deleteTourney(id) {
        if(confirm("Удалить турнир?")) {
            tournaments = tournaments.filter(t => t.id !== id);
            renderTournaments();
        }
    }
</script>
</body>
</html>
