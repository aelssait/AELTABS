<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AEL top teams | CS2 Полная Система</title>
    <style>
        :root {
            --bg-main: #13161b;
            --bg-card: #1c2026;
            --bg-header: #0c0e12;
            --text-main: #e2e8f0;
            --text-muted: #718096;
            --accent: #e5a93b; 
            --accent-hover: #ffc257;
            --silver: #cbd5e1;
            --bronze: #b45309;
            --active-green: #22c55e;
            --inactive-red: #ef4444;
            --border: #262c35;
            --transition-smooth: all 0.25s ease;
            --neon-shadow: none;
        }

        /* 💎 СЕКРЕТНОЕ НЕОНОВОЕ ОФОРМЛЕНИЕ ЗА ИДЕАЛЬНЫЙ ПИKEM 💎 */
        body.perfect-pickem-unlocked {
            --bg-main: #0a0b10;
            --bg-card: #121420;
            --bg-header: #05060b;
            --accent: #00ffcc;
            --accent-hover: #33ffdd;
            --border: #1f3d44;
            --neon-shadow: 0 0 20px rgba(0, 255, 204, 0.6);
        }
        body.perfect-pickem-unlocked .logo span {
            text-shadow: 0 0 15px rgba(0, 255, 204, 0.8);
            animation: pulseNeon 2s infinite alternate;
        }
        @keyframes pulseNeon {
            from { text-shadow: 0 0 10px rgba(0, 255, 204, 0.5); }
            to { text-shadow: 0 0 25px rgba(0, 255, 204, 0.9); }
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-main); padding-bottom: 60px; transition: var(--transition-smooth); }

        header { background-color: var(--bg-header); border-bottom: 2px solid var(--accent); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .logo { font-size: 24px; font-weight: bold; }
        .logo span { color: var(--accent); }
        
        nav { display: flex; gap: 5px; }
        nav button { background: none; border: none; color: var(--text-main); font-size: 15px; font-weight: 500; cursor: pointer; padding: 10px 16px; transition: var(--transition-smooth); border-radius: 4px; }
        nav button.active { background: rgba(229, 169, 59, 0.1); color: var(--accent); }
        body.perfect-pickem-unlocked nav button.active { background: rgba(0, 255, 204, 0.1); color: var(--accent); }

        .container { max-width: 1200px; margin: 20px auto; padding: 0 15px; }
        .hidden { display: none !important; }

        .admin-trigger { background: var(--bg-card); border: 1px solid var(--border); color: var(--text-muted); padding: 8px 15px; border-radius: 4px; cursor: pointer; }
        .admin-panel { background: var(--bg-card); border: 1px solid var(--accent); padding: 20px; border-radius: 6px; margin-bottom: 25px; display: none; }
        .admin-panel h3 { color: var(--accent); margin-bottom: 15px; }

        button.btn { background: var(--accent); color: var(--bg-header); border: none; padding: 10px 20px; font-weight: bold; border-radius: 4px; cursor: pointer; text-transform: uppercase; font-size: 12px; }
        button.btn:disabled { background: var(--border) !important; color: var(--text-muted) !important; cursor: not-allowed; }

        .form-inline { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 15px; }
        .form-inline input, .form-inline select { background: var(--bg-main); border: 1px solid var(--border); color: #fff; padding: 8px; border-radius: 4px; }

        /* ================= ТАБЛИЦА СТАНДАРТНОГО РЕЙТИНГА И ИГРОКИ ================= */
        .ranking-table { width: 100%; border-collapse: separate; border-spacing: 0 10px; }
        .ranking-table th { color: var(--text-muted); text-align: left; padding: 10px 20px; font-size: 13px; text-transform: uppercase; }
        .ranking-table td { background: var(--bg-card); padding: 18px 20px; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); cursor: pointer; transition: var(--transition-smooth); }
        
        .ranking-table td:first-child { border-left: 1px solid var(--border); border-top-left-radius: 6px; border-bottom-left-radius: 6px; width: 70px; text-align: center; font-size: 18px; font-weight: bold; }
        .ranking-table td:last-child { border-right: 1px solid var(--border); border-top-right-radius: 6px; border-bottom-right-radius: 6px; }
        
        /* Рамки 1, 2, 3 места */
        .ranking-table tr.top-1 td { border-top-color: var(--accent) !important; border-bottom-color: var(--accent) !important; }
        .ranking-table tr.top-1 td:first-child { border-left-color: var(--accent) !important; }
        .ranking-table tr.top-1 td:last-child { border-right-color: var(--accent) !important; }

        .ranking-table tr.top-2 td { border-top-color: var(--silver) !important; border-bottom-color: var(--silver) !important; }
        .ranking-table tr.top-2 td:first-child { border-left-color: var(--silver) !important; }
        .ranking-table tr.top-2 td:last-child { border-right-color: var(--silver) !important; }

        .ranking-table tr.top-3 td { border-top-color: var(--bronze) !important; border-bottom-color: var(--bronze) !important; }
        .ranking-table tr.top-3 td:first-child { border-left-color: var(--bronze) !important; }
        .ranking-table tr.top-3 td:last-child { border-right-color: var(--bronze) !important; }

        .col-points { text-align: right; font-weight: bold; color: var(--accent); font-size: 18px; width: 150px; }
        .col-points span { font-size: 12px; color: var(--text-muted); margin-left: 5px; }

        /* Выпадающий список игроков */
        .players-row td { padding: 0 !important; background: none !important; border: none !important; }
        .players-box { padding: 15px 20px; background: rgba(18, 21, 26, 0.95); border-radius: 6px; margin-top: -5px; margin-bottom: 10px; border: 1px solid var(--border); border-left: 4px solid var(--accent); }
        .players-list { display: flex; gap: 10px; flex-wrap: wrap; list-style: none; }
        .players-list li { background: var(--bg-main); padding: 6px 14px; border-radius: 4px; font-size: 13px; border: 1px solid var(--border); }

        /* ================= ТУРНИРЫ ================= */
        .tournaments-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 20px; }
        .tournament-card { background: var(--bg-card); border-radius: 6px; overflow: hidden; border: 1px solid var(--border); position: relative; transition: var(--transition-smooth); }
        .tournament-card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .tournament-img { width: 100%; height: 160px; background-size: cover; background-position: center; background-image: url('https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=500'); }
        .tournament-info { padding: 15px; }
        .status-badge { position: absolute; top: 10px; right: 10px; padding: 4px 8px; border-radius: 3px; font-size: 11px; font-weight: bold; }
        .status-badge.active { background: var(--active-green); color: #fff; }
        .status-badge.inactive { background: var(--inactive-red); color: #fff; }

        /* ================= СЕТКА PICK'EM ================= */
        .pickem-controls { display: flex; justify-content: space-between; align-items: center; background: var(--bg-header); padding: 15px; border-radius: 6px; margin-bottom: 20px; }
        .bracket-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; align-items: start; margin-top: 20px; overflow-x: auto; padding-bottom: 20px; }
        .bracket-column { background: rgba(28, 32, 38, 0.4); padding: 15px; border-radius: 6px; border: 1px solid var(--border); min-width: 250px; }
        .bracket-column h4 { text-align: center; margin-bottom: 15px; color: var(--text-muted); font-size: 13px; text-transform: uppercase; }
        
        .match-box { background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px; margin-bottom: 15px; padding: 10px; display: flex; flex-direction: column; gap: 6px; }
        .match-title { font-size: 11px; color: var(--text-muted); border-bottom: 1px solid var(--border); padding-bottom: 4px; margin-bottom: 4px; }

        .pick-team-btn { background: var(--bg-main); border: 1px solid var(--border); color: var(--text-main); padding: 8px 12px; text-align: left; border-radius: 4px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; width: 100%; transition: var(--transition-smooth); }
        .pick-team-btn:hover { border-color: var(--accent); }
        .pick-team-btn.voted { border-color: var(--accent); background: rgba(229, 169, 59, 0.1); font-weight: bold; }
        body.perfect-pickem-unlocked .pick-team-btn.voted { border-color: var(--accent); background: rgba(0, 255, 204, 0.1); }

        .pick-team-btn.result-winner { border-color: var(--active-green) !important; background: rgba(34, 197, 94, 0.15) !important; position: relative; }
        .pick-team-btn.result-winner::after { content: '🏆'; position: absolute; right: 10px; }
        .pick-team-btn.result-loser { border-color: var(--inactive-red) !important; background: rgba(239, 68, 68, 0.1) !important; opacity: 0.6; }

        /* АДМИН ДРАГ-Н-ДРОП */
        .admin-drag-section { display: grid; grid-template-columns: 1fr 2fr; gap: 20px; margin-top: 15px; padding-top: 15px; border-top: 1px dashed var(--border); }
        .drag-pool { background: var(--bg-main); border: 1px dashed var(--border); padding: 15px; border-radius: 6px; max-height: 400px; overflow-y: auto; }
        .drag-item { background: var(--bg-card); border: 1px solid var(--border); padding: 8px 12px; margin-bottom: 8px; border-radius: 4px; cursor: grab; font-size: 14px; }
        
        .admin-slots-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .admin-match-slot { background: var(--bg-main); border: 1px solid var(--border); padding: 10px; border-radius: 6px; }
        .drop-zone { background: rgba(255,255,255,0.02); border: 2px dashed var(--border); min-height: 42px; border-radius: 4px; display: flex; align-items: center; padding: 0 10px; color: var(--text-muted); font-size: 13px; margin: 4px 0; }
        .drop-zone.hover { border-color: var(--accent); background: rgba(229,169,59,0.05); }

        .reward-banner { background: linear-gradient(90deg, #00ffcc 0%, #00bcff 100%); color: #05060b; padding: 15px 20px; border-radius: 6px; margin-bottom: 20px; font-weight: bold; box-shadow: var(--neon-shadow); }
    </style>
</head>
<body>

<header>
    <div class="logo">AEL <span>top teams</span></div>
    <nav>
        <button id="tab-teams" class="active" onclick="switchTab('teams')">Рейтинг</button>
        <button id="tab-tourneys" onclick="switchTab('tourneys')">Турниры</button>
        <button id="tab-pickem" onclick="switchTab('pickem')">Pick'Em Сетка</button>
    </nav>
    <button class="admin-trigger" onclick="toggleAdminMode()">Войти как Админ</button>
</header>

<div class="container">

    <!-- Секретный баннер -->
    <div id="rewardBanner" class="reward-banner hidden">
        🎉 Поздравляем! Вы безошибочно угадали все исходы матчей Stage 1! Разблокирован Неоновый стиль сайта!
    </div>

    <!-- АДМИН-ПАНЕЛЬ -->
    <div id="adminPanel" class="admin-panel">
        <h3>Управление Системой AEL (Админ)</h3>
        
        <div class="form-inline">
            <label style="align-self: center;"><strong>Этап Pick'Em:</strong></label>
            <select id="adminActiveStageSelect" onchange="changeActiveStageByAdmin()">
                <option value="1">Stage 1 (1/8 финала)</option>
                <option value="2">Stage 2 (1/4 финала)</option>
                <option value="3">Stage 3 (1/2 финала)</option>
                <option value="4">Stage 4 (Финал)</option>
                <option value="5">Завершено</option>
            </select>
            <button class="btn" style="background: var(--active-green); color:#fff;" onclick="commitStageResults()">✔️ Утвердить победителей</button>
            <button class="btn" style="background: var(--inactive-red); color:#fff;" onclick="resetPickemSystem()">🗑️ Сбросить Pick'Em</button>
        </div>

        <!-- Добавление турниров -->
        <div class="form-inline" style="margin-top: 15px; border-top: 1px dashed var(--border); padding-top: 15px;">
            <input type="text" id="tourneyName" placeholder="Название нового турнира">
            <select id="tourneyStatus">
                <option value="active">Активен</option>
                <option value="inactive">Завершен</option>
            </select>
            <button class="btn" onclick="addTournamentByAdmin()">Добавить турнир</button>
        </div>

        <!-- Конструктор пар -->
        <h4 style="margin-top: 15px; color: var(--accent);">⚙️ Конструктор пар текущего этапа</h4>
        <div class="admin-drag-section">
            <div class="drag-pool" id="adminDragPool" ondragover="allowDrop(event)" ondrop="handlePoolDrop(event)"></div>
            <div>
                <div class="admin-slots-grid" id="adminSlotsGrid"></div>
                <button class="btn" style="margin-top: 15px; width:100%;" onclick="saveAdminCreatedMatches()">💾 Сохранить созданные пары</button>
            </div>
        </div>
    </div>

    <!-- ВКЛАДКА: РЕЙТИНГ (С ИГРОКАМИ) -->
    <div id="page-teams">
        <table class="ranking-table">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Команда</th>
                    <th style="text-align: right;">Баллы</th>
                </tr>
            </thead>
            <tbody id="teamsTableBody"></tbody>
        </table>
    </div>

    <!-- ВКЛАДКА: ТУРНИРЫ -->
    <div id="page-tourneys" class="hidden">
        <div class="tournaments-grid" id="tournamentsGrid"></div>
    </div>

    <!-- ВКЛАДКА: PICK'EM СЕТКА -->
    <div id="page-pickem" class="hidden">
        <div class="pickem-controls">
            <div style="font-size: 16px; font-weight: bold;" id="userStageStatusTitle">Текущий этап: Stage 1</div>
            <button class="btn" id="saveUserPicksBtn" onclick="saveUserPredictions()">🔒 Отправить свой прогноз</button>
        </div>

        <div class="bracket-container">
            <div class="bracket-column">
                <h4>Stage 1 (1/8)</h4>
                <div id="bracket-stage-1"></div>
            </div>
            <div class="bracket-column">
                <h4>Stage 2 (1/4)</h4>
                <div id="bracket-stage-2"></div>
            </div>
            <div class="bracket-column">
                <h4>Stage 3 (1/2)</h4>
                <div id="bracket-stage-3"></div>
            </div>
            <div class="bracket-column">
                <h4>Финал</h4>
                <div id="bracket-stage-4"></div>
            </div>
        </div>
    </div>

</div>

<script>
    // 16 команд с реальными составами для раскрытия списка игроков
    let defaultTeamsData = [
        { name: "Natus Vincere", points: 1200, players: ["jL", "b1t", "Aleksib", "iIM", "w0nderful"] },
        { name: "Team Spirit", points: 1100, players: ["donk", "shalfey", "chopper", "magixx", "zoner"] },
        { name: "FaZe Clan", points: 950, players: ["karrigan", "rain", "ropz", "broky", "frozen"] },
        { name: "Vitality", points: 910, players: ["ZywOo", "apEX", "Spinx", "FlameZ", "mezii"] },
        { name: "G2 Esports", points: 880, players: ["Snax", "NiKo", "m0NESY", "hunter", "malbsMd"] },
        { name: "MOUZ", points: 820, players: ["siuhy", "xertioN", "torzsi", "Jimpphat", "Brollan"] },
        { name: "Virtus.pro", points: 750, players: ["Jame", "FL1T", "fame", "electroNic", "n0rb3r7"] },
        { name: "Astralis", points: 710, players: ["dev1ce", "staehr", "br0", "jabbi", "stavn"] },
        { name: "Team Liquid", points: 640, players: ["Twistzz", "jks", "ultimate", "NAF", "mithR"] },
        { name: "HEROIC", points: 610, players: ["kyxsan", "TeSeS", "sjuush", "NertZ", "degster"] },
        { name: "Eternal Fire", points: 590, players: ["XANTARES", "Calyx", "MAJ3R", "Wicadia", "wooxie"] },
        { name: "FURIA", points: 550, players: ["Fallen", "chelo", "KSCERATO", "yuurih", "skullz"] },
        { name: "Complexity", points: 520, players: ["JT", "EliGE", "floppy", "hallzerk", "Grim"] },
        { name: "MIBR", points: 480, players: ["exit", "brnz4n", "saffee", "drop", "insani"] },
        { name: "BIG", points: 450, players: ["tabseN", "Krimbo", "syrsoN", "JDC", "rigoN"] },
        { name: "SAW", points: 410, players: ["MUTIRIS", "rmn", "ewjrk", "story", "roman"] }
    ];

    const initial16Names = defaultTeamsData.map(t => t.name);

    let pickemSystem = JSON.parse(localStorage.getItem('ael_bracket_system')) || {
        activeStage: 1, 
        allowedTeamsPerStage: { 1: [...initial16Names], 2: [], 3: [], 4: [] },
        matches: { 1: [], 2: [], 3: [], 4: [] }
    };

    let guestPredictions = JSON.parse(localStorage.getItem('ael_guest_predictions')) || { 1: {}, 2: {}, 3: {}, 4: {} };
    let tournaments = JSON.parse(localStorage.getItem('ael_tournaments')) || [
        { name: "AEL Masters 2026", status: "active" },
        { name: "AEL Spring Cup", status: "inactive" }
    ];

    let isAdmin = false;

    saveAndSync();
    renderRatingTable();
    renderTournaments();

    function saveAndSync() {
        localStorage.setItem('ael_bracket_system', JSON.stringify(pickemSystem));
        localStorage.setItem('ael_guest_predictions', JSON.stringify(guestPredictions));
        localStorage.setItem('ael_tournaments', JSON.stringify(tournaments));
        checkRewardUnlock();
    }

    function switchTab(tab) {
        document.getElementById('tab-teams').classList.remove('active');
        document.getElementById('tab-tourneys').classList.remove('active');
        document.getElementById('tab-pickem').classList.remove('active');
        
        document.getElementById('page-teams').classList.add('hidden');
        document.getElementById('page-tourneys').classList.add('hidden');
        document.getElementById('page-pickem').classList.add('hidden');

        if (tab === 'teams') {
            document.getElementById('tab-teams').classList.add('active');
            document.getElementById('page-teams').classList.remove('hidden');
        } else if (tab === 'tourneys') {
            document.getElementById('tab-tourneys').classList.add('active');
            document.getElementById('page-tourneys').classList.remove('hidden');
            renderTournaments();
        } else {
            document.getElementById('tab-pickem').classList.add('active');
            document.getElementById('page-pickem').classList.remove('hidden');
            renderWholeBracket();
        }
    }

    /* ================= ЛОГИКА РЕЙТИНГА И РАСКРЫТИЯ ИГРОКОВ ================= */
    function renderRatingTable() {
        const tbody = document.getElementById('teamsTableBody');
        tbody.innerHTML = '';
        
        defaultTeamsData.sort((a,b) => b.points - a.points).forEach((team, idx) => {
            let rankClass = idx === 0 ? 'top-1' : (idx === 1 ? 'top-2' : (idx === 2 ? 'top-3' : ''));
            let prefix = idx === 0 ? '👑 ' : `${idx + 1}`;
            
            // Строка команды
            const tr = document.createElement('tr');
            tr.className = rankClass;
            tr.onclick = () => togglePlayersList(idx);
            tr.innerHTML = `
                <td>${prefix}</td>
                <td><strong>${team.name}</strong></td>
                <td class="col-points">${team.points}<span>очков</span></td>
            `;
            tbody.appendChild(tr);

            // Скрытая строка с игроками
            const playersTr = document.createElement('tr');
            playersTr.id = `players-row-${idx}`;
            playersTr.className = 'players-row';
            playersTr.style.display = 'none';
            let listHtml = team.players.map(p => `<li>${p}</li>`).join('');
            playersTr.innerHTML = `<td colspan="3"><div class="players-box"><ul class="players-list">${listHtml}</ul></div></td>`;
            tbody.appendChild(playersTr);
        });
    }

    function togglePlayersList(idx) {
        const row = document.getElementById(`players-row-${idx}`);
        row.style.display = row.style.display === 'none' ? 'table-row' : 'none';
    }

    /* ================= ЛОГИКА ТУРНИРОВ ================= */
    function renderTournaments() {
        const grid = document.getElementById('tournamentsGrid');
        grid.innerHTML = '';
        tournaments.forEach(t => {
            grid.innerHTML += `
                <div class="tournament-card">
                    <div class="tournament-img"></div>
                    <span class="status-badge ${t.status === 'active' ? 'active' : 'inactive'}">${t.status === 'active' ? 'Активен' : 'Завершен'}</span>
                    <div class="tournament-info"><div style="font-weight:bold;">${t.name}</div></div>
                </div>
            `;
        });
    }

    function addTournamentByAdmin() {
        const name = document.getElementById('tourneyName').value.trim();
        if(!name) return alert("Введите имя турнира");
        tournaments.push({ name, status: document.getElementById('tourneyStatus').value });
        document.getElementById('tourneyName').value = '';
        saveAndSync(); renderTournaments(); alert("Турнир успешно добавлен!");
    }

    /* ================= УПРАВЛЕНИЕ АДМИНКОЙ (PICK'EM) ================= */
    function toggleAdminMode() {
        if (!isAdmin) {
            let pass = prompt("Введите пароль администратора:");
            if (pass === "adminAEL") {
                isAdmin = true;
                document.getElementById('adminPanel').style.display = 'block';
                document.getElementById('adminActiveStageSelect').value = pickemSystem.activeStage;
                setupAdminMatchBuilder();
                renderWholeBracket();
            } else { alert("Неверный пароль!"); }
        } else {
            isAdmin = false;
            document.getElementById('adminPanel').style.display = 'none';
            renderWholeBracket();
        }
    }

    function setupAdminMatchBuilder() {
        const stage = pickemSystem.activeStage;
        const poolContainer = document.getElementById('adminDragPool');
        const slotsGrid = document.getElementById('adminSlotsGrid');
        poolContainer.innerHTML = ''; slotsGrid.innerHTML = '';

        if (stage > 4) { poolContainer.innerHTML = 'Турнир завершен'; return; }

        let currentMatches = pickemSystem.matches[stage] || [];
        let placedTeams = [];
        currentMatches.forEach(m => { if(m.t1) placedTeams.push(m.t1); if(m.t2) placedTeams.push(m.t2); });

        let availableTeams = pickemSystem.allowedTeamsPerStage[stage].filter(t => !placedTeams.includes(t));
        
        availableTeams.forEach(team => {
            const div = document.createElement('div');
            div.className = 'drag-item'; div.draggable = true; div.innerText = team;
            div.ondragstart = (e) => e.dataTransfer.setData("text", team);
            poolContainer.appendChild(div);
        });

        let totalMatchesCount = stage === 1 ? 8 : (stage === 2 ? 4 : (stage === 3 ? 2 : 1));
        for (let i = 0; i < totalMatchesCount; i++) {
            let existingMatch = currentMatches[i] || { id: i, t1: "", t2: "", winner: "" };
            const matchSlot = document.createElement('div');
            matchSlot.className = 'admin-match-slot';
            matchSlot.innerHTML = `
                <div style="font-size:11px; color:var(--accent); margin-bottom:5px;">Пара #${i+1}</div>
                <div class="drop-zone" ondragover="allowDrop(event)" ondrop="handleSlotDrop(event, ${i}, 't1')">${existingMatch.t1 ? `<b>${existingMatch.t1}</b>` : 'Команда 1'}</div>
                <div class="drop-zone" ondragover="allowDrop(event)" ondrop="handleSlotDrop(event, ${i}, 't2')">${existingMatch.t2 ? `<b>${existingMatch.t2}</b>` : 'Команда 2'}</div>
                ${existingMatch.t1 && existingMatch.t2 ? `
                    <select id="winner-select-${i}" style="width:100%; margin-top:4px; background:#000; color:#fff;">
                        <option value="">-- Выбрать победителя --</option>
                        <option value="${existingMatch.t1}" ${existingMatch.winner === existingMatch.t1 ? 'selected':''}>${existingMatch.t1}</option>
                        <option value="${existingMatch.t2}" ${existingMatch.winner === existingMatch.t2 ? 'selected':''}>${existingMatch.t2}</option>
                    </select>
                `:''}
            `;
            slotsGrid.appendChild(matchSlot);
        }
    }

    function allowDrop(e) { e.preventDefault(); }
    function handleSlotDrop(e, matchIdx, slotType) {
        e.preventDefault();
        const teamName = e.dataTransfer.setData ? e.dataTransfer.getData("text") : e.dataTransfer.getData("text");
        const stage = pickemSystem.activeStage;
        if (!pickemSystem.matches[stage]) pickemSystem.matches[stage] = [];
        if (!pickemSystem.matches[stage][matchIdx]) pickemSystem.matches[stage][matchIdx] = { id: matchIdx, t1: "", t2: "", winner: "" };
        pickemSystem.matches[stage][matchIdx][slotType] = teamName;
        setupAdminMatchBuilder();
    }
    function handlePoolDrop(e) {
        e.preventDefault();
        const teamName = e.dataTransfer.getData("text");
        (pickemSystem.matches[pickemSystem.activeStage] || []).forEach(m => {
            if (m.t1 === teamName) m.t1 = ""; if (m.t2 === teamName) m.t2 = "";
        });
        setupAdminMatchBuilder();
    }

    function saveAdminCreatedMatches() {
        const stage = pickemSystem.activeStage;
        let totalMatchesCount = stage === 1 ? 8 : (stage === 2 ? 4 : (stage === 3 ? 2 : 1));
        for(let i=0; i<totalMatchesCount; i++) {
            if (pickemSystem.matches[stage] && pickemSystem.matches[stage][i]) {
                const sel = document.getElementById(`winner-select-${i}`);
                if (sel) pickemSystem.matches[stage][i].winner = sel.value;
            }
        }
        saveAndSync(); setupAdminMatchBuilder(); renderWholeBracket(); alert("Сохранено!");
    }

    function changeActiveStageByAdmin() {
        pickemSystem.activeStage = parseInt(document.getElementById('adminActiveStageSelect').value);
        saveAndSync(); setupAdminMatchBuilder(); renderWholeBracket();
    }

    function commitStageResults() {
        const stage = pickemSystem.activeStage;
        let currentMatches = pickemSystem.matches[stage] || [];
        let winners = [];
        let totalMatchesCount = stage === 1 ? 8 : (stage === 2 ? 4 : (stage === 3 ? 2 : 1));

        for(let i=0; i<totalMatchesCount; i++) {
            const sel = document.getElementById(`winner-select-${i}`);
            if (sel && sel.value) currentMatches[i].winner = sel.value;
        }

        let allDetermined = true;
        for (let i = 0; i < totalMatchesCount; i++) {
            if (!currentMatches[i] || !currentMatches[i].winner) { allDetermined = false; break; }
            winners.push(currentMatches[i].winner);
        }

        if (!allDetermined) return alert("Выберите победителей во всех матчах!");

        let nextStage = stage + 1;
        if (nextStage <= 4) {
            pickemSystem.allowedTeamsPerStage[nextStage] = winners;
            pickemSystem.activeStage = nextStage;
            document.getElementById('adminActiveStageSelect').value = nextStage;
        } else {
            pickemSystem.activeStage = 5;
            document.getElementById('adminActiveStageSelect').value = 5;
        }
        saveAndSync(); setupAdminMatchBuilder(); renderWholeBracket(); alert("Итоги зафиксированы!");
    }

    function resetPickemSystem() {
        if(confirm("Сбросить сетку?")) {
            pickemSystem = { activeStage: 1, allowedTeamsPerStage: { 1: [...initial16Names], 2: [], 3: [], 4: [] }, matches: { 1: [], 2: [], 3: [], 4: [] } };
            guestPredictions = { 1: {}, 2: {}, 3: {}, 4: {} };
            saveAndSync(); setupAdminMatchBuilder(); renderWholeBracket();
        }
    }

    /* ================= ИНТЕРФЕЙС СЕТКИ ДЛЯ ГОСТЕЙ ================= */
    function renderWholeBracket() {
        const statusTitle = document.getElementById('userStageStatusTitle');
        if (pickemSystem.activeStage <= 4) {
            statusTitle.innerHTML = `Текущий игровой этап: <span style="color:var(--accent);">Stage ${pickemSystem.activeStage}</span>`;
            document.getElementById('saveUserPicksBtn').classList.remove('hidden');
        } else {
            statusTitle.innerHTML = `<span style="color:var(--active-green);">🏆 Турнир завершен!</span>`;
            document.getElementById('saveUserPicksBtn').classList.add('hidden');
        }

        for (let st = 1; st <= 4; st++) {
            const columnContainer = document.getElementById(`bracket-stage-${st}`);
            columnContainer.innerHTML = '';
            let matches = pickemSystem.matches[st] || [];
            
            if (matches.length === 0) {
                columnContainer.innerHTML = `<div style="text-align:center; color:var(--text-muted); font-size:12px; padding:15px; border:1px dashed var(--border);">Ожидание пар...</div>`;
                continue;
            }

            matches.forEach((m) => {
                if(!m.t1 && !m.t2) return;
                const mBox = document.createElement('div');
                mBox.className = 'match-box';
                mBox.innerHTML = `<div class="match-title">Матч #${m.id + 1}</div>`;

                [m.t1, m.t2].forEach(team => {
                    if(!team) return;
                    const btn = document.createElement('button');
                    btn.className = `pick-team-btn ${getCardStyleClass(st, m, team)}`;
                    btn.innerText = team;
                    if (pickemSystem.activeStage === st) {
                        btn.onclick = () => {
                            if (!guestPredictions[st]) guestPredictions[st] = {};
                            guestPredictions[st][m.id] = guestPredictions[st][m.id] === team ? null : team;
                            renderWholeBracket();
                        };
                    }
                    mBox.appendChild(btn);
                });
                columnContainer.appendChild(mBox);
            });
        }
    }

    function getCardStyleClass(stage, match, teamName) {
        let classes = [];
        if (guestPredictions[stage] && guestPredictions[stage][match.id] === teamName) classes.push('voted');
        if (match.winner) {
            if (match.winner === teamName) classes.push('result-winner');
            else classes.push('result-loser');
        }
        return classes.join(' ');
    }

    function saveUserPredictions() {
        const stage = pickemSystem.activeStage;
        let totalMatchesCount = stage === 1 ? 8 : (stage === 2 ? 4 : (stage === 3 ? 2 : 1));
        let userMadePicksCount = Object.values(guestPredictions[stage] || {}).filter(Boolean).length;

        if (userMadePicksCount < totalMatchesCount) return alert(`Сделайте все ${totalMatchesCount} прогнозов!`);
        saveAndSync(); alert("Прогноз принят!");
    }

    function checkRewardUnlock() {
        let stage1Matches = pickemSystem.matches[1] || [];
        if (stage1Matches.length < 8) return setPremiumStyle(false);
        let totalCorrect = 0, checked = 0;
        stage1Matches.forEach(m => {
            if (m.winner) {
                checked++;
                if (guestPredictions[1] && guestPredictions[1][m.id] === m.winner) totalCorrect++;
            }
        });
        setPremiumStyle(checked === 8 && totalCorrect === 8);
    }

    function setPremiumStyle(unlocked) {
        const banner = document.getElementById('rewardBanner');
        if (unlocked) {
            document.body.classList.add('perfect-pickem-unlocked');
            if(banner) banner.classList.remove('hidden');
        } else {
            document.body.classList.remove('perfect-pickem-unlocked');
            if(banner) banner.classList.add('hidden');
        }
    }
</script>
</body>
</html>
